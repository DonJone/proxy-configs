mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
external-controller: '127.0.0.1:9090'
unified-delay: true
hosts:
    time.facebook.com: 17.253.84.125
    time.android.com: 17.253.84.125
dns:
    enable: true
    use-hosts: true
    nameserver: [119.29.29.29, 223.5.5.5, 223.6.6.6, 'tcp://223.5.5.5', 'tcp://223.6.6.6', 'tls://dns.google:853', 'tls://8.8.8.8:853', 'tls://8.8.4.4:853', 'tls://dns.alidns.com', 'tls://223.5.5.5', 'tls://223.6.6.6', 'tls://dot.pub', 'tls://1.12.12.12', 'tls://120.53.53.53', 'https://dns.google/dns-query', 'https://8.8.8.8/dns-query', 'https://8.8.4.4/dns-query', 'https://dns.alidns.com/dns-query', 'https://223.5.5.5/dns-query', 'https://223.6.6.6/dns-query', 'https://doh.pub/dns-query', 'https://1.12.12.12/dns-query', 'https://120.53.53.53/dns-query']
    default-nameserver: [119.29.29.29, 223.5.5.5, 223.6.6.6, 'tcp://119.29.29.29', 'tcp://223.5.5.5', 'tcp://223.6.6.6']

profile:
  store-selected: true
  store-fake-ip: false

# ========================
# 机场节点订阅
# ========================
proxy-providers:
  ######（机场备注）:
    url: "机场链接url"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

# ========================
# 策略组 Proxy Groups (高可用极简架构)
# ========================
proxy-groups:
  # ==========================================
  # 基础组件：三大手选组 (包含所有节点)
  # ==========================================
  - { name: 手选节点 A, type: select, include-all: true }
  - { name: 手选节点 B, type: select, include-all: true }
  - { name: 手选节点 C, type: select, include-all: true }

  # ==========================================
  # 业务分配与顶层路由
  # ==========================================
  - { name: 漏网之鱼, type: select, proxies: [线路 A, 线路 B, 线路 C] }
  - { name: AI与谷歌, type: select, proxies: [线路 A, 线路 B, 线路 C] }
  - { name: 海外抖音, type: select, proxies: [线路 B, 线路 C, 线路 A] }
  - { name: Emby服务, type: select, proxies: [线路 C, 线路 A, 线路 B] }
  - { name: 影音娱乐, type: select, proxies: [线路 A, 线路 B, 线路 C] }
  - { name: 社交媒体, type: select, proxies: [线路 A, 线路 B, 线路 C, DIRECT] }
  - { name: 游戏平台, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C] }
  - { name: 微软苹果Nvidia, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C] }

  # 下方为静默组，保持隐藏以精简 UI
  - { name: 国内服务, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C], hidden: true }

  # ==========================================
  # 核心架构：故障转移专线与全局自动 (置底)
  # ==========================================
  - { name: 线路 A, type: fallback, proxies: [手选节点 A, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 线路 B, type: fallback, proxies: [手选节点 B, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 线路 C, type: fallback, proxies: [手选节点 C, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 全局自动, type: url-test, include-all: true, exclude-filter: "(?i)dialer", url: "http://cp.cloudflare.com/generate_204", interval: 30, tolerance: 50, hidden: true }

# ========================
# 规则引擎（rules）
# ========================
rules:
  # ==========================================
  # 1. 基础环境与私有网络 (最高优先级)
  # ==========================================
  - RULE-SET,Private,DIRECT
  - RULE-SET,GoogleFCM,DIRECT
  - DOMAIN-KEYWORD,libvio,DIRECT

  # ==========================================
  # 2. 人工智能与谷歌服务 (AI与谷歌)
  # ==========================================
  - RULE-SET,ChatGPT,AI与谷歌
  - RULE-SET,Claude,AI与谷歌
  - RULE-SET,Copilot,AI与谷歌
  - RULE-SET,Gemini,AI与谷歌
  - RULE-SET,Apple_AI,AI与谷歌
  - RULE-SET,Groq,AI与谷歌
  - RULE-SET,Grok,AI与谷歌
  - RULE-SET,Perplexity,AI与谷歌
  - RULE-SET,Google,AI与谷歌

  # ==========================================
  # 3. 社交媒体与即时通讯 (社交媒体)
  # ==========================================
  - RULE-SET,Telegram,社交媒体
  - RULE-SET,Twitter,社交媒体
  - RULE-SET,Reddit,社交媒体

  # ==========================================
  # 4. 影音娱乐分流 (影音娱乐/Emby)
  # ==========================================
  - RULE-SET,Youtube,影音娱乐
  - RULE-SET,Netflix,影音娱乐
  - RULE-SET,Netflix_IP,影音娱乐,no-resolve
  - RULE-SET,Disney,影音娱乐
  - RULE-SET,HBO,影音娱乐
  - RULE-SET,Spotify,影音娱乐
  - RULE-SET,Crunchyroll,影音娱乐
  - RULE-SET,Popcorn,影音娱乐
  - RULE-SET,Amazon,影音娱乐
  - RULE-SET,GitHub,影音娱乐
  - RULE-SET,Emby,Emby服务

  # ==========================================
  # 5. 跨国巨头分流 (微软/苹果/Nvidia)
  # ==========================================
  - RULE-SET,Microsoft,微软苹果Nvidia
  - RULE-SET,Apple,微软苹果Nvidia
  - RULE-SET,Nvidia,微软苹果Nvidia
  - RULE-SET,Apple_CN,DIRECT

  # ==========================================
  # 6. 游戏平台分流 (游戏平台)
  # ==========================================
  - RULE-SET,Steam,游戏平台
  - RULE-SET,Epic,游戏平台
  - RULE-SET,EA,游戏平台
  - RULE-SET,Blizzard,游戏平台
  - RULE-SET,UBI,游戏平台
  - RULE-SET,PlayStation,游戏平台
  - RULE-SET,Nintendo,游戏平台

  # ==========================================
  # 7. 抖音与特定业务 (国内服务/海外抖音)
  # ==========================================
  - RULE-SET,TikTok,海外抖音
  - DOMAIN-KEYWORD,douyin,国内服务
  - RULE-SET,Douyin,国内服务

  # ==========================================
  # 8. 其它出海/杂项规则 (漏网之鱼)
  # ==========================================
  - RULE-SET,OKX,漏网之鱼
  - RULE-SET,Bybit,漏网之鱼
  - RULE-SET,Binance,漏网之鱼
  - RULE-SET,Turnstile,漏网之鱼
  - RULE-SET,Proxy,漏网之鱼
  - RULE-SET,Global,漏网之鱼

  # ==========================================
  # 9. 大陆流量兜底 (国内服务/DIRECT)
  # ==========================================
  # 核心大陆域名直连判定
  - RULE-SET,CN_Domain,DIRECT
  # 大陆 IP 段兜底 (不强制 DNS 解析)
  - RULE-SET,China_IP,国内服务,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - GEOIP,CN,国内服务

  # ==========================================
  # 10. 最终兜底逻辑
  # ==========================================
  - MATCH,漏网之鱼


