mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: "127.0.0.1:9090"
unified-delay: true
tcp-concurrent: true
hosts:
  time.facebook.com: 17.253.84.125
  time.android.com: 17.253.84.125
dns:
  enable: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    [
      "https://dns.alidns.com/dns-query",
      "https://doh.pub/dns-query",
      "tls://dns.alidns.com",
      "tls://dot.pub",
    ]
  default-nameserver:
    [
      119.29.29.29,
      223.5.5.5,
    ]

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 机场节点订阅
# ========================
proxy-providers:
  ######（机场备注）:
    url: "机场链接url"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT

# ========================
# 策略组 Proxy Groups (高可用极简架构)
# ========================
proxy-groups:
  # ==========================================
  # 1. 基础组件：三大核心控制台 (你的手动选择面板)
  # ==========================================
  - {
      name: 亚太,
      type: select,
      include-all: true,
      filter: "(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)",
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  - {
      name: 欧美,
      type: select,
      include-all: true,
      filter: "(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)",
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  - {
      name: 低倍,
      type: select,
      include-all: true,
      filter: '(?i)(0(?:\.[0-7]\d*)?\s*[xX倍]|低倍)',
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }

  # ==========================================
  # 2. 备用组件：同区自动测速池 (静默运行，精简 UI)
  # ==========================================
  - {
      name: 亚太备用,
      type: url-test,
      include-all: true,
      filter: "(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)",
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }
  - {
      name: 欧美备用,
      type: url-test,
      include-all: true,
      # 【修复】：删除了末尾多余的游离双引号
      filter: '(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)',
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }
  - {
      name: 低倍备用,
      type: url-test,
      include-all: true,
      filter: '(?i)(0(?:\.[0-7]\d*)?\s*[xX倍]|低倍)',
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }

  # ==========================================
  # 3. 业务分配与顶层路由
  # ==========================================
  - {
      name: AI与Google,
      type: select,
      proxies: [欧美区, 亚太区, 低倍率],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ChatGPT3.png",
    }
  - {
      name: TikTok,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok_1.png",
    }
  - {
      name: Emby,
      type: select,
      proxies: [DIRECT, 亚太区, 低倍率, 欧美区],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  # 【修复】：重命名合并非法换行和带有逗号的策略组名称
  - {
      name: 社交流媒体GitHub,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率, DIRECT],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Telegram_01.png",
    }
  - {
      name: 游戏平台,
      type: select,
      proxies: [DIRECT, 亚太区, 欧美区],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png",
    }
  # 【修复】：修正 Nvdia 为 Nvidia
  - {
      name: 微软苹果Nvidia,
      type: select,
      proxies: [DIRECT, 亚太区, 欧美区],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_02.png",
    }
  - {
      name: 加密货币与兜底,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率, DIRECT],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png",
    }

  # ==========================================
  # 4. 静默拦截组
  # ==========================================
  - { name: 国内服务, type: select, proxies: [DIRECT, 亚太区], hidden: true }
  - { name: 广告拦截, type: select, proxies: [REJECT], hidden: true }

  # ==========================================
  # 5. 核心架构：同区故障转移专线 (置底)
  # ==========================================
  - {
      name: 亚太区,
      type: fallback,
      proxies: [亚太, 亚太备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }
  - {
      name: 欧美区,
      type: fallback,
      proxies: [欧美, 欧美备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }
  - {
      name: 低倍率,
      type: fallback,
      proxies: [低倍, 低倍备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }

