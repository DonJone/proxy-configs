# ========================
# OpenClash-融合优化配置 (Meta 内核完全版)
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
secret: "123456"

# ========================
# DNS 与 TUN 设置 (Redir-Host + TUN 模式)
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  # 关闭 fake-ip，改用 redir-host 模式
  enhanced-mode: redir-host
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

# 全局 IPv6 开关，建议与 DNS 配置保持一致
ipv6: false

tun:
  enable: true
  stack: system
  device: utun
  endpoint-independent-nat: true
  # 提示：在 OpenClash 中，auto-route 通常由插件界面控制
  # 若需内核自动接管路由，请将以下设为 true
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  # 关闭 Fake-IP 映射存储
  store-fake-ip: false



# ========================
# 机场节点订阅
# ========================
proxy-providers:
  ######（机场备注）:
    url: "机场链接url"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT


#此处填入自建节点/链式代理
#proxies:
#eg（链式代理模板）：
#  - { name: "链式代理节点1", type: ss, server: "argosbx.de5.net", port: 18553, cipher: "2022-blake3-aes-128-gcm", password: "bCljz2yD", dialer-proxy: "手选节点 A" }
#  - { name: "链式代理节点2", type: hysteria2, server: "argosbx.de5.net", port: 18286, password: "730a115b-", sni: "www.bing.com", alpn: ["h3"], skip-cert-verify: true, dialer-proxy: "手选节点 A" }

# ========================
# 策略组 Proxy Groups (高可用极简架构)
# ========================
proxy-groups:
  # ==========================================
  # 基础组件：三大手选组 (包含所有节点)
  # ==========================================
  - { name: 手选节点 A, type: select, include-all: true }
  - { name: 手选节点 B, type: select, include-all: true }
  - { name: 手选节点 C, type: select, include-all: true }

  # ==========================================
  # 业务分配与顶层路由
  # ==========================================
  - { name: 漏网之鱼, type: select, proxies: [线路 A, 线路 B, 线路 C] }
  - { name: AI与谷歌, type: select, proxies: [线路 A, 线路 B, 线路 C] } 
  - { name: 海外抖音, type: select, proxies: [线路 B, 线路 C, 线路 A] } 
  - { name: Emby服务, type: select, proxies: [线路 C, 线路 A, 线路 B] }
  - { name: 影音娱乐, type: select, proxies: [线路 A, 线路 B, 线路 C] }
  - { name: 社交媒体, type: select, proxies: [线路 A, 线路 B, 线路 C, DIRECT] }
  - { name: 游戏平台, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C] }
  - { name: 微软苹果Nvidia, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C] }
  
  # 下方为静默组，保持隐藏以精简 UI
  - { name: 国内服务, type: select, proxies: [DIRECT, 线路 A, 线路 B, 线路 C], hidden: true }
  - { name: 广告拦截, type: select, proxies: [REJECT], hidden: true }

  # ==========================================
  # 核心架构：故障转移专线与全局自动 (置底)
  # ==========================================
  - { name: 线路 A, type: fallback, proxies: [手选节点 A, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 线路 B, type: fallback, proxies: [手选节点 B, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 线路 C, type: fallback, proxies: [手选节点 C, 全局自动], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 全局自动, type: url-test, include-all: true, exclude-filter: "(?i)dialer", url: "http://cp.cloudflare.com/generate_204", interval: 30, tolerance: 50, hidden: true }

