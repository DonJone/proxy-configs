# Custom_OpenClash_Rules
# YAML 配置文件
# 注释部分由 AI 补充，可能存在错误，请自行甄别！
# ==================== 端口配置 Port Configuration ====================
# HTTP 代理端口，用于处理 HTTP 协议流量
port: 7890
# SOCKS5 代理端口，用于处理 SOCKS5 协议流量
socks-port: 7891
# 混合端口（HTTP + SOCKS5），同时支持 HTTP 和 SOCKS5 协议
mixed-port: 7893
# 透明代理重定向端口（Linux 环境）
redir-port: 7892
# TProxy 端口（Linux 环境的透明代理）
tproxy-port: 7895
# 是否允许局域网连接，true 表示允许其他设备通过本机代理上网
allow-lan: true
# 绑定地址，"*" 表示监听所有网卡，可指定具体 IP
bind-address: "*"
# 工作模式：rule（规则模式）/ global（全局模式）/ direct（直连模式）
mode: rule
# 是否启用 TCP 并发，可提高连接性能
tcp-concurrent: true
# 统一延迟计算，使延迟测试更准确
unified-delay: true

# ==================== 代理提供者 Proxy Provider ====================
# 用于从订阅链接获取节点，多机场用户复制整个 provider1 块并改名为 provider2, provider3...
# 同时在后续所有 proxy-groups 的 use 列表中添加新provider
proxy-providers:
  provider1:
    type: http  # 类型：http（从URL获取）或 file（本地文件）
    url: "url"  # **填入你的订阅链接**
    interval: 3600  # 订阅更新间隔（秒），3600=1小时
    path: ./proxy_provider/provider1.yaml # 本地缓存路径
    proxy: DIRECT  # 下载订阅时使用的代理策略
    header:  # 自定义 HTTP 请求头
    health-check:  # 节点健康检查
      enable: true
      interval: 600  # 检查间隔（秒）
      url: https://cp.cloudflare.com/generate_204
    override:  # 覆写节点配置
      skip-cert-verify: true  # 跳过证书验证
      udp: true  # 启用UDP
      # additional-prefix: "[provider1]"  # 为节点名添加前缀
      # additional-suffix: "test"  # 为节点名添加后缀

# ==================== 地理数据库配置 GeoData Configuration ====================
# 用于 IP 和域名的地理位置及分类判断
geox-url:
  # MaxMind 数据库（含中国 IP）
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
  # GeoIP 数据库
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  # GeoSite 数据库（域名分类）
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  # ASN（自治系统号）数据库，用于更精确的 IP 归属判断
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
# 是否自动更新 geodata 数据库
geo-auto-update: true # 是否自动更新 geodata
# 更新间隔（小时），24 = 每天更新一次
geo-update-interval: 24 # 更新间隔，单位：小时
# 使用 geodata 模式（而非传统的 IP-CIDR 文件）
geodata-mode: true

# ==================== 日志与控制 ====================
# 日志级别：silent（静默）/ error（错误）/ warning（警告）/ info（信息）/ debug（调试）
log-level: info
# 是否启用 IPv6，true 表示支持 IPv6 流量
ipv6: true
# 外部控制器地址，用于 Web UI 和 API 访问，0.0.0.0:9090 表示监听所有网卡的 9090 端口
external-controller: 0.0.0.0:9090

# ==================== 配置文件存储 Profile ====================
profile:
  # 是否保存用户选择的策略组（重启后自动恢复）
  store-selected: true
  # 是否保存 Fake-IP 映射表（重启后保留 DNS 缓存）
  store-fake-ip: true

# ==================== TUN 虚拟网卡配置 ====================
# TUN 模式可以接管系统全部流量，实现真正的全局代理
tun:
  # 是否启用 TUN 模式
  enable: true
  # 网络栈：system（系统栈）/ gvisor（内置用户态栈）/ mixed（混合）
  stack: system
  # DNS 劫持配置，劫持所有发往 53 端口的 DNS 请求
  dns-hijack:
    - 0.0.0.0:53
  # 自动检测网络接口（OpenClash 环境下应设为 false，由 OpenClash 管理）
  auto-detect-interface: false
  # 自动配置路由表（OpenClash 环境下应设为 false）
  auto-route: false
  # 自动配置 iptables 重定向（OpenClash 环境下应设为 false）
  auto-redirect: false
  # 严格路由模式（OpenClash 环境下应设为 false）
  strict-route: false
  # 端点无关 NAT（提高 NAT 类型兼容性，适用于 P2P 和游戏）
  endpoint-independent-nat: true

# ==================== 流量嗅探器 Sniffer ====================
# 嗅探器可以通过分析流量内容还原真实域名，提高分流准确性
sniffer:
  # 启用嗅探功能
  enable: true
  # 使用嗅探结果覆盖连接目标（推荐开启）
  override-destination: true
  # 嗅探协议配置
  sniff:
    # QUIC 协议嗅探（HTTP/3）
    QUIC:
      ports:
      - 443
    # TLS 协议嗅探（HTTPS）
    TLS:
      ports:
      - 443  # 标准 HTTPS 端口
      - 8443  # 常用替代 HTTPS 端口
    # HTTP 协议嗅探
    HTTP:
      ports:
      - 80  # 标准 HTTP 端口
      - 8080-8880  # HTTP 常用端口范围
      override-destination: true
  # 强制对这些域名进行嗅探（即使已经有目标地址）
  force-domain:
    - "+.netflix.com"  # Netflix 主域名
    - "+.nflxvideo.net"  # Netflix CDN
    - "+.amazonaws.com"  # AWS 云服务
    - "+.media.dssott.com"  # Disney+ 流媒体
  # 跳过对这些域名的嗅探（避免干扰）
  skip-domain:
    - "+.apple.com"  # 苹果服务
    - Mijia Cloud  # 米家云服务
    - dlg.io.mi.com  # 小米设备通信
    - "+.oray.com"  # 花生壳服务
    - "+.sunlogin.net"  # 向日葵远程控制
    - "+.push.apple.com"  # 苹果推送服务
  # 解析纯 IP 连接（尝试通过 rDNS 反向解析获得域名）
  parse-pure-ip: true
  # 强制 DNS 映射（对纯 IP 连接尝试 DNS 映射）
  force-dns-mapping: true

# ==================== DNS 配置 ====================
dns:
  # 启用内置 DNS 服务器
  enable: true
  # DNS 服务器监听地址，0.0.0.0:7874 表示监听所有网卡的 7874 端口
  listen: 0.0.0.0:7874
  # 是否解析 IPv6 地址
  ipv6: true
  # DNS 增强模式：fake-ip（虚假 IP）/ redir-host（真实 IP），fake-ip 模式性能更好
  enhanced-mode: fake-ip
  # Fake-IP 地址池范围（私有地址段，不会与真实 IP 冲突）
  fake-ip-range: 198.18.0.1/16
  # Fake-IP 过滤列表（这些域名将返回真实 IP 而非 Fake-IP）
  fake-ip-filter:
    - '*.lan'  # 局域网域名
    - localhost.ptlogin2.qq.com  # QQ 登录域名
    - geosite:cn  # 中国大陆域名（使用 GeoSite 数据）
  # Fake-IP 过滤模式：blacklist（黑名单）/ whitelist（白名单）
  fake-ip-filter-mode: blacklist
  # 是否遵循规则（false 表示所有 DNS 查询都通过直连查询，不经过代理规则）
  respect-rules: false
  # 主 DNS 服务器列表（用于实际域名解析）
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true  # 阿里云 DoH，启用 DoH3
    - https://doh.pub/dns-query  # 腾讯 DoH
  # 默认 DNS 服务器（用于解析其他 DNS 服务器的域名）
  default-nameserver:
    - tls://1.12.12.12
    - tls://120.53.53.53
    

# ========================
# 策略组 Proxy Groups (高可用区域架构)
# ========================
proxy-groups:
  # ==========================================
  # 1. 基础组件：三大核心控制台 (你的手动选择面板)
  # ==========================================
  - { name: 亚太, type: select, include-all: true, filter: '(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)', icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png" }
  - { name: 欧美, type: select, include-all: true, filter: '(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)', icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png" }
  - { name: 低倍, type: select, include-all: true, filter: '(?i)(0(?:\.[1-7]\d*)?\s*[xX倍]|低倍)', icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png" }

  # ==========================================
  # 2. 备用组件：同区自动测速池 (静默运行，精简 UI)
  # ==========================================
  - { name: 亚太备用, type: url-test, include-all: true, filter: '(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)', url: "http://cp.cloudflare.com/generate_204", interval: 30, tolerance: 50, hidden: true }
  - { name: 欧美备用, type: url-test, include-all: true, filter: '(?i)(?!.*0(?:\.[0-7]\d*)?\s*[xX倍])(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)', url: "http://cp.cloudflare.com/generate_204", interval: 30, tolerance: 50, hidden: true }
  - { name: 低倍备用, type: url-test, include-all: true, filter: '(?i)(0(?:\.[1-7]\d*)?\s*[xX倍]|低倍)', url: "http://cp.cloudflare.com/generate_204", interval: 30, tolerance: 50, hidden: true }

  # ==========================================
  # 3. 业务分配与顶层路由
  # ==========================================
  - { name: AI与Google, type: select, proxies: [欧美区, 亚太区, 低倍率], icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ChatGPT3.png" }
  - { name: TikTok, type: select, proxies: [亚太区, 欧美区, 低倍率], icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok_1.png" }
  - { name: Emby, type: select, proxies: [DIRECT, 亚太区, 低倍率, 欧美区], icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png" }
  # 【修复】：将有逗号语病的策略组名称整合成合法字段，匹配下方规则
  - { name: 社交流媒体GitHub, type: select, proxies: [亚太区, 欧美区, 低倍率, DIRECT], icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Telegram_01.png" }
  - { name: 游戏平台, type: select, proxies: [DIRECT, 亚太区, 欧美区], icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png" }
  - { name: 微软苹果Nvidia, type: select, proxies: [DIRECT, 亚太区, 欧美区], icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_02.png" }
  - { name: 加密货币与兜底, type: select, proxies: [亚太区, 欧美区, 低倍率, DIRECT], icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png" }

  # ==========================================
  # 4. 静默拦截组
  # ==========================================
  - { name: 国内服务, type: select, proxies: [DIRECT, 亚太区], hidden: true }
  - { name: 广告拦截, type: select, proxies: [REJECT], hidden: true }

  # ==========================================
  # 5. 核心架构：同区故障转移专线 (置底)
  # ==========================================
  - { name: 亚太区, type: fallback, proxies: [亚太, 亚太备用], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 欧美区, type: fallback, proxies: [欧美, 欧美备用], url: "http://cp.cloudflare.com/generate_204", interval: 30 }
  - { name: 低倍率, type: fallback, proxies: [低倍, 低倍备用], url: "http://cp.cloudflare.com/generate_204", interval: 30 }

