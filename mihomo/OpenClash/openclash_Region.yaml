  - RULE-SET,Disney,社交 ,流媒体,GitHub
  - RULE-SET,HBO,社交 ,流媒体,GitHub
  - RULE-SET,Spotify,社交 ,流媒体,GitHub
  - RULE-SET,Crunchyroll,社交 ,流媒体,GitHub
  - RULE-SET,Popcorn,社交 ,流媒体,GitHub
  - RULE-SET,Amazon,社交 ,流媒体,GitHub
  - RULE-SET,GitHub,社交 ,流媒体,GitHub

  # ==========================================
  # 4. 专属影音服务 (Emby)
  # ==========================================
  - RULE-SET,Emby,Emby

  # ==========================================
  # 5. 跨国巨头分流 (微软/苹果/Nvdia)
  # ==========================================
  - RULE-SET,Microsoft,微软苹果Nvdia
  - RULE-SET,Apple,微软苹果Nvdia
  - RULE-SET,Nvidia,微软苹果Nvdia
  - RULE-SET,Apple_CN,DIRECT

  # ==========================================
  # 6. 游戏平台分流 (游戏平台)
  # ==========================================
  - RULE-SET,Steam,游戏平台
  - RULE-SET,Epic,游戏平台
  - RULE-SET,EA,游戏平台
  - RULE-SET,Blizzard,游戏平台
  - RULE-SET,UBI,游戏平台
  - RULE-SET,PlayStation,游戏平台
  - RULE-SET,Nintendo,游戏平台

  # ==========================================
  # 7. 抖音与特定业务 (国内服务/TikTok)
  # ==========================================
  - RULE-SET,TikTok,TikTok
  - DOMAIN-KEYWORD,douyin,国内服务
  - RULE-SET,Douyin,国内服务

  # ==========================================
  # 8. 加密货币、出海与兜底规则 (加密货币与兜底)
  # ==========================================
  - RULE-SET,OKX,加密货币与兜底
  - RULE-SET,Bybit,加密货币与兜底
  - RULE-SET,Binance,加密货币与兜底
  - RULE-SET,Turnstile,加密货币与兜底
  - RULE-SET,Proxy,加密货币与兜底
  - RULE-SET,Global,加密货币与兜底

  # ==========================================
  # 9. 大陆流量兜底 (国内服务/DIRECT)
  # ==========================================
  - GEOSITE,CN,国内服务
  - GEOIP,CN,国内服务

  # ==========================================
  # 10. 最终兜底逻辑
  # ==========================================
  - MATCH,加密货币与兜底

# ========================
# 规则集提供者
# ========================
rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class:
    &class { type: http, interval: 86400, behavior: classical, format: text }

rule-providers:
  Private:
    {
      <<: *class,
      behavior: domain,
