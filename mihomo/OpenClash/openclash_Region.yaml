# ========================
# OpenClash-融合优化配置 (Meta 内核完全版)
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
secret: "123456"

# ========================
# DNS 与 TUN 设置 (Redir-Host + TUN 模式)
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  # 关闭 fake-ip，改用 redir-host 模式
  enhanced-mode: redir-host
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

# 全局 IPv6 开关，建议与 DNS 配置保持一致
ipv6: false

tun:
  enable: true
  stack: system
  device: utun
  endpoint-independent-nat: true
  # 提示：在 OpenClash 中，auto-route 通常由插件界面控制
  # 若需内核自动接管路由，请将以下设为 true
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  # 关闭 Fake-IP 映射存储
  store-fake-ip: false

# ========================
# 机场节点订阅
# ========================
proxy-providers:
  ######（机场备注）:
  url: "机场链接url"
  type: http
  interval: 86400
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 300
  proxy: DIRECT

# ========================
# 策略组 Proxy Groups (高可用极简架构)
# ========================
proxy-groups:
  # ==========================================
  # 1. 基础组件：三大核心控制台 (你的手动选择面板)
  # ==========================================
  - {
      name: 亚太,
      type: select,
      include-all: true,
      filter: '(?i)(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)',
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  - {
      name: 欧美,
      type: select,
      include-all: true,
      filter: '(?i)(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)'",
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  - {
      name: 低倍,
      type: select,
      include-all: true,
      filter: '(?i)(0\.\d+\s*[xX倍]|低倍)',
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }

  # ==========================================
  # 2. 备用组件：同区自动测速池 (静默运行，精简 UI)
  # ==========================================
  - {
      name: 亚太备用,
      type: url-test,
      include-all: true,
      filter: "(?i)(港|HK|Hong|Kong|台|TW|Tai|Wan|日|JP|Japan|新加坡|狮城|SG|Singapore|韩|KR|Korea|马|MY|Malaysia|印度|IN|India|澳|AU|Australia|澳门|Macau)",
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }
  - {
      name: 欧美备用,
      type: url-test,
      include-all: true,
      filter: '(?i)(美|US|America|纽约|洛杉矶|圣何塞|芝加哥|西雅图|加拿大|CA|Canada|英|UK|Kingdom|Britain|伦敦|德|DE|Germany|法|FR|France|荷兰|NL|Netherlands|俄|RU|Russia|意|IT|Italy|瑞士|CH|Switzerland|瑞典|SE|Sweden|阿根廷|AR|Argentina|巴西|BR|Brazil|墨西哥|MX|Mexico)'",
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }
  - {
      name: 低倍备用,
      type: url-test,
      include-all: true,
      filter: '(?i)(0\.\d+\s*[xX倍]|低倍)',
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
      tolerance: 50,
      hidden: true,
    }

  # ==========================================
  # 3. 业务分配与顶层路由
  # ==========================================
  - {
      name: AI与Google,
      type: select,
      proxies: [欧美区, 亚太区, 低倍率],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/ChatGPT3.png",
    }
  - {
      name: TikTok,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/TikTok_1.png",
    }
  - {
      name: Emby,
      type: select,
      proxies: [DIRECT, 亚太区, 低倍率, 欧美区],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png",
    }
  - {
      name: 社交,
      流媒体,
      GitHub,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率, DIRECT],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Telegram_01.png",
    }
  - {
      name: 游戏平台,
      type: select,
      proxies: [DIRECT, 亚太区, 欧美区],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Game.png",
    }
  - {
      name: 微软苹果Nvdia,
      type: select,
      proxies: [DIRECT, 亚太区, 欧美区],
      icon: "https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_02.png",
    }
  - {
      name: 加密货币与兜底,
      type: select,
      proxies: [亚太区, 欧美区, 低倍率, DIRECT],
      icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Bypass.png",
    }

  # ==========================================
  # 4. 静默拦截组
  # ==========================================
  - { name: 国内服务, type: select, proxies: [DIRECT, 亚太区], hidden: true }
  - { name: 广告拦截, type: select, proxies: [REJECT], hidden: true }

  # ==========================================
  # 5. 核心架构：同区故障转移专线 (置底)
  # ==========================================
  - {
      name: 亚太区,
      type: fallback,
      proxies: [亚太, 亚太备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }
  - {
      name: 欧美区,
      type: fallback,
      proxies: [欧美, 欧美备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }
  - {
      name: 低倍率,
      type: fallback,
      proxies: [低倍, 低倍备用],
      url: "http://cp.cloudflare.com/generate_204",
      interval: 30,
    }

# ========================
# 规则引擎（rules）
# ========================
rules:
  # ==========================================
  # 1. 基础环境与私有网络 (最高优先级)
  # ==========================================
  - RULE-SET,Private,DIRECT
  - RULE-SET,GoogleFCM,DIRECT
  - DOMAIN-KEYWORD,libvio,DIRECT
  - DOMAIN-KEYWORD,emby,Emby
  - DOMAIN-KEYWORD,uhdnow,Emby

  # ==========================================
  # 2. 人工智能与谷歌服务 (AI与Google)
  # ==========================================
  - RULE-SET,ChatGPT,AI与Google
  - RULE-SET,Claude,AI与Google
  - RULE-SET,Copilot,AI与Google
  - RULE-SET,Gemini,AI与Google
  - RULE-SET,Apple_AI,AI与Google
  - RULE-SET,Groq,AI与Google
  - RULE-SET,Grok,AI与Google
  - RULE-SET,Perplexity,AI与Google
  - RULE-SET,Google,AI与Google

  # ==========================================
  # 3. 社交、流媒体与代码托管 (合并组)
  # ==========================================
  - IP-CIDR,5.28.195.0/24,REJECT,no-resolve
  - RULE-SET,Telegram,社交 ,流媒体,GitHub
  - RULE-SET,Twitter,社交 ,流媒体,GitHub
  - RULE-SET,Reddit,社交 ,流媒体,GitHub
  - RULE-SET,Youtube,社交 ,流媒体,GitHub
  - RULE-SET,Netflix,社交 ,流媒体,GitHub
